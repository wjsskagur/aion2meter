name: Build and Release

on:
  push:
    tags:
      - 'v*'          # v1.0.0 형태의 태그 push 시 실행
  workflow_dispatch:  # GitHub 웹에서 수동 실행 버튼

jobs:
  build:
    runs-on: windows-latest

    # Release 생성/수정 권한 명시
    # 기본 GITHUB_TOKEN은 read-only라 Release 업데이트 시 403 발생
    permissions:
      contents: write

    # main 브랜치 커밋에 달린 태그일 때만 실행
    # 이유: on.push.tags 는 브랜치 필터를 지원하지 않아서
    #       job 레벨 if 로 체크하는 것이 유일한 방법
    # github.event.base_ref: 태그가 가리키는 커밋이 속한 브랜치
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       startsWith(github.ref, 'refs/tags/v') &&
       github.event.base_ref == 'refs/heads/main')

    # Node.js 24 강제 적용 - 2026년 6월부터 Node 20 actions 지원 중단
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ── 1. 소스 체크아웃 ──────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6

      # ── 2. .NET 8 SDK 설치 ────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ── 3. 태그에서 버전 번호 추출 ────────────────────
      # 태그가 v1.2.3 이면 VERSION=1.2.3 으로 저장
      # workflow_dispatch(수동실행)면 0.0.0-dev 로 설정
      - name: Extract version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      # ── 4. csproj 버전 자동 업데이트 ──────────────────
      # 태그 버전과 exe 버전을 일치시키기 위해
      - name: Update version in csproj
        shell: bash
        run: |
          sed -i "s|<Version>.*</Version>|<Version>${{ steps.version.outputs.VERSION }}</Version>|" \
            Aion2Meter/Aion2Meter.csproj

      # ── 4-2. NuGet 패키지 복원 ────────────────────────
      - name: Restore packages
        shell: pwsh
        run: dotnet restore

      # ── 5. dotnet publish → WPF UI ────────────────────
      - name: Publish UI
        shell: pwsh
        run: |
          $publishDir = "${{ github.workspace }}\publish"
          dotnet publish Aion2Meter/Aion2Meter.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishReadyToRun=true `
            -o $publishDir

          if (-not (Test-Path "$publishDir\Aion2Meter.exe")) {
            Write-Error "Aion2Meter.exe not found"
            exit 1
          }
          Write-Host "UI published OK"

      # ── 5-2. dotnet publish → 캡처 프로세스 ───────────
      # Aion2Meter.Capture.exe 를 같은 publish 폴더에 출력
      # 실행 시 Aion2Meter.exe 와 같은 폴더에 있어야 함
      - name: Publish Capture Process
        shell: pwsh
        run: |
          $publishDir = "${{ github.workspace }}\publish"
          dotnet publish Aion2Meter.Capture/Aion2Meter.Capture.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -o $publishDir

          if (-not (Test-Path "$publishDir\Aion2Meter.Capture.exe")) {
            Write-Error "Aion2Meter.Capture.exe not found"
            exit 1
          }
          Write-Host "Capture process published OK"
          Write-Host "Files in publish dir:"
          Get-ChildItem $publishDir | Select-Object Name, Length

      # ── 5-3. Resources 폴더 복사 ──────────────────────
      # skills.json, mobs.json을 publish 폴더에 복사
      # Aion2Meter.exe와 Aion2Meter.Capture.exe 모두 같은 폴더에서 로드
      - name: Copy Resources
        shell: pwsh
        run: |
          $publishDir = "${{ github.workspace }}\publish"
          $resDir = "$publishDir\Resources"
          New-Item -ItemType Directory -Force -Path $resDir | Out-Null
          Copy-Item "Aion2Meter\Resources\skills.json" "$resDir\skills.json"
          Copy-Item "Aion2Meter\Resources\mobs.json"   "$resDir\mobs.json"
          Write-Host "Resources copied OK"
          Write-Host "skills.json: $((Get-Item "$resDir\skills.json").Length) bytes"
          Write-Host "mobs.json:   $((Get-Item "$resDir\mobs.json").Length) bytes"

      # ── 6. NSIS 설치 ──────────────────────────────────
      # NSIS는 Windows Runner에 기본 설치 안 되어 있음
      - name: Install NSIS
        run: choco install nsis -y
        shell: pwsh

      # ── 7. Npcap 설치 파일 다운로드 ───────────────────
      # 인스톨러에 번들링하기 위해 빌드 시 다운로드
      # 라이선스상 재배포 가능 여부 확인 후 사용
      - name: Download Npcap installer
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://npcap.com/dist/npcap-1.80.exe" `
            -OutFile "installer/npcap-installer.exe"

      # ── 8. NSIS로 Setup.exe 빌드 ──────────────────────
      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          # OUTPUT_DIR을 절대경로로 전달 - NSIS .nsi 파일 위치와 무관하게 정확히 찾도록
          $publishDir = "${{ github.workspace }}\publish"
          $nsisExe = "C:\Program Files (x86)\NSIS\makensis.exe"

          Write-Host "Version: $version"
          Write-Host "Publish dir: $publishDir"
          Write-Host "Exe exists: $(Test-Path "$publishDir\Aion2Meter.exe")"

          & $nsisExe `
            /DVERSION=$version `
            "/DOUTPUT_DIR=$publishDir" `
            installer/Aion2Meter.nsi

          if ($LASTEXITCODE -ne 0) {
            Write-Error "NSIS build failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

      # ── 9. GitHub Releases에 업로드 ───────────────────
      # 태그 push 시에만 실제 Release 생성
      # workflow_dispatch 시에는 Artifacts로만 저장
      - name: Upload artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: Aion2Meter-Setup-${{ steps.version.outputs.VERSION }}
          path: installer/Aion2Meter-Setup.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Aion2 Meter ${{ steps.version.outputs.VERSION }}
          body: |
            ## Aion2 Meter ${{ steps.version.outputs.VERSION }}

            ### 설치 방법
            1. `Aion2Meter-Setup.exe` 다운로드
            2. 실행 (Npcap 자동 설치 포함)
            3. 바탕화면 바로가기로 실행

            ### 변경사항
            ${{ github.event.head_commit.message }}
          files: installer/Aion2Meter-Setup.exe
          draft: false
          prerelease: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
